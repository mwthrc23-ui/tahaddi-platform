# The web app uses NextAuth, API routes, and Server Actions, so it requires a Node runtime.
# GitHub Pages static export is intentionally not part of this workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tahaddi?schema=public
      AUTH_SECRET: ci-only-playwright-secret
      AUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      RUN_AUTH_E2E: 'true'
      TAHADDI_DEPLOY_TARGET: node
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tahaddi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tahaddi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Apply migrations to the test database
        run: pnpm db:migrate:deploy

      - name: Seed Playwright test data
        run: pnpm db:seed

      - name: Install Playwright Chromium
        run: pnpm --filter @tahaddi/web exec playwright install --with-deps chromium

      - name: Playwright end-to-end tests
        working-directory: apps/web
        run: pnpm test:e2e

      - name: Build web app
        run: pnpm build
