name: CI and deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tahaddi?schema=public
      TAHADDI_DEPLOY_TARGET: node
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web app
        run: pnpm build

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.TAHADDI_DEPLOY_TARGET == 'static'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.TAHADDI_DEPLOY_TARGET == 'static'
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/out

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.TAHADDI_DEPLOY_TARGET == 'static'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
